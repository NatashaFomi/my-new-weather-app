<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheather app</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="top">
        <div class="logo">
          <div class="logo-icon">🌥️</div>
          <div>Weatherly</div>
        </div>
        <form class="search-form" id="search-form">
          <input
            type="search"
            id="search-form-input"
            placeholder="Enter a city.."
            required
          />
          <input type="submit" value="Search" />
        </form>
      </header>
      <main class="main-weather">
        <div>
          <h1 id="city-name"></h1>
          <p class="date" id="current-date"><br /></p>
          <div class="status" id="status">Mostly Sunny</div>
          <p class="subtitle">Enjoy your day!</p>
        </div>
        <div class="weather-summary">
          <div class="weather-icon" id="icon"></div>
          <div class="temperature">
            <span id="actual-temperature"></span><span class="degree">°C</span>
          </div>
          <p class="feels-like" id="feels-like">
            <strong></strong>
          </p>
        </div>
      </main>
      <section class="details">
        <div class="detail">
          <div>
            <div class="detail-icon">💧</div>
            <div class="detail-title">Humidity</div>
            <div class="detail-value" id="humidity"></div>
          </div>
        </div>
        <div class="detail">
          <div>
            <div class="detail-icon">💨</div>
            <div class="detail-title">Wind</div>
            <div class="detail-value" id="wind-speed"></div>
          </div>
        </div>
        <div class="detail">
          <div>
            <div class="detail-icon">⏱️</div>
            <div class="detail-title">Presure</div>
            <div class="detail-value" id="pressure-value"></div>
          </div>
        </div>
      </section>
      <section>
        <h2>5-Day Forecast</h2>
        <div class="forecast">
          <div class="day">
            <div class="day-name">Tue</div>
            <div class="day-icon">☀️</div>
            <div class="high">23°</div>
            <div class="low">12°</div>
          </div>
          <div class="day">
            <div class="day-name">Wed</div>
            <div class="day-icon">🌥️</div>
            <div class="high">24°</div>
            <div class="low">12°</div>
          </div>
          <div class="day">
            <div class="day-name">Thu</div>
            <div class="day-icon">🌤️</div>
            <div class="high">24°</div>
            <div class="low">12°</div>
          </div>
          <div class="day">
            <div class="day-name">Fri</div>
            <div class="day-icon">☀️</div>
            <div class="high">25°</div>
            <div class="low">15°</div>
          </div>
          <div class="day">
            <div class="day-name">Sat</div>
            <div class="day-icon">🌧️</div>
            <div class="high">21°</div>
            <div class="low">15°</div>
          </div>
        </div>
      </section>
      <footer>
        Coded by
        <a href="https://github.com/NatashaFomi" target="_blank"
          >Nataliia Fomina</a
        >
        and on
        <a
          href="https://github.com/NatashaFomi/my-new-weather-app"
          target="_blank"
          >GitHub</a
        >
        hosted on
        <a href="https://weather-new-app-meteo.netlify.app/" target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
